# ============================================================
# Spring Boot Reserved Properties
# ============================================================

# Server Configuration
server.port=8080
server.tomcat.threads.virtual=true

# Datasource Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public

# Jackson Configuration
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
# ============================================================
# Third-Party Library Properties
# ============================================================

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ============================================================
# Custom Application Properties
# ============================================================

# JWT Configuration
app.jwt.secret=${JWT_SECRET:REPLACE-THIS-WITH-A-32-BYTE-MIN-BASE64-SECRET}
app.jwt.access-token-ttl-seconds=900
app.jwt.refresh-token-ttl-seconds=604800

# Cookie Configuration
app.cookie.enabled=true
app.cookie.name=accessToken
app.cookie.http-only=true
app.cookie.secure=true
app.cookie.same-site=Strict
app.cookie.path=/

# Token Blacklist Configuration
app.blacklist.strategy=rdbms
app.blacklist.cleanup-cron=0 0 * * * *

# Data Seeding Configuration
app.seeding.enabled=true
app.seeding.developer-email=${DEV_EMAIL:dev@example.com}
app.seeding.developer-initial-password=${DEV_PASSWORD:ChangeMe123!}

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.max-age-seconds=3600